<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dat Valoir Luxury Hotels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      /* Custom scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1a1a1a; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #444; 
        border-radius: 3px;
      }
      
      /* Animation for content text appearing */
      @keyframes showContent {
        from {
          opacity: 0;
          transform: translateY(40px); /* Giảm khoảng cách để tinh tế hơn */
          filter: blur(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }
      
      .animate-show-content {
        animation: showContent 1s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) 1 forwards;
      }

      /* --- CINEMATIC NOISE TEXTURE --- */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* --- LUXURY TYPOGRAPHY EFFECTS --- */

      /* 1. Champagne Gold (Sang trọng hơn, bớt vàng chanh) */
      .text-luxury-gold {
        background: linear-gradient(
          to right, 
          #cfc09f 0%, 
          #ffecb3 25%, 
          #a67c00 50%, 
          #ffd700 75%, 
          #cfc09f 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        background-size: 200% auto;
        animation: shine 6s linear infinite;
        filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.1));
      }

      /* 2. Diamond Silver/White (Ánh bạc tinh khiết) */
      .text-luxury-white {
        background: linear-gradient(
          120deg,
          #e0e0e0 0%,
          #ffffff 40%,
          #b8c6db 50%, 
          #ffffff 60%,
          #e0e0e0 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        background-size: 200% auto;
        animation: shine 8s ease-in-out infinite;
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
